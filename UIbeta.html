<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DADN CNPM 252 - Toàn diện UI Beta (Standalone)</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#1488D8',
                            light: '#E8F4FB',
                            dark: '#0D6AB3',
                        }
                    },
                    fontFamily: {
                        sans: ['Be Vietnam Pro', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'spin': 'spin 1s linear infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Be Vietnam Pro', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        .bg-technical-blueprint {
            background-color: #030391;
            background-image: url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=2070&auto=format&fit=crop');
            background-blend-mode: overlay;
            background-size: cover;
            background-position: center;
        }
        .blueprint-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(17, 24, 39, 0.8) 100%);
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // ============================================================
        // ⚙️ CALCULATION ENGINE (uc05Engine.js logic)
        // ============================================================
        
        const MATERIAL_GRADES = [
            { name: 'Thép 45',  HB: 215, sigma_b: 750, sigma_ch: 450, sigma_Hlim: 500, sigma_Flim: 387 },
            { name: 'Thép 40X', HB: 245, sigma_b: 850, sigma_ch: 550, sigma_Hlim: 560, sigma_Flim: 441 },
            { name: 'Thép 40XH',HB: 265, sigma_b: 800, sigma_ch: 600, sigma_Hlim: 600, sigma_Flim: 477 },
            { name: 'Thép 35XM',HB: 241, sigma_b: 900, sigma_ch: 800, sigma_Hlim: 552, sigma_Flim: 433 },
            { name: 'Thép 20X', HB: 480, sigma_b: 650, sigma_ch: 400, sigma_Hlim: 1150, sigma_Flim: 750 },
        ];

        const CHAIN_PARAMS = [
            { p: 12.70, Q: 18.2, q: 0.65, A: 39.6,  s_allow: 7.8, n_ref: 200 },
            { p: 15.875,Q: 22.7, q: 0.80, A: 51.5,  s_allow: 7.8, n_ref: 200 },
            { p: 19.05, Q: 31.8, q: 1.90, A: 106,   s_allow: 8.2, n_ref: 200 },
            { p: 25.40, Q: 56.7, q: 2.60, A: 180,   s_allow: 8.2, n_ref: 200 },
            { p: 31.75, Q: 88.5, q: 3.80, A: 262,   s_allow: 8.5, n_ref: 200 },
            { p: 38.10, Q: 127.0,q: 5.50, A: 395,   s_allow: 8.5, n_ref: 200 },
            { p: 44.45, Q: 172.4,q: 7.50, A: 473,   s_allow: 8.5, n_ref: 200 },
            { p: 50.80, Q: 226.8,q: 9.70, A: 645,   s_allow: 8.5, n_ref: 200 },
        ];

        const STANDARD_MODULES = [1, 1.25, 1.5, 2, 2.5, 3, 4, 5, 6, 8, 10];
        const STANDARD_CENTER_DISTANCES = [80, 100, 125, 140, 160, 180, 200, 225, 250, 280, 315];
        const STANDARD_SHAFT_DIAMS = [10,12,14,16,18,20,22,25,28,30,32,35,38,40,45,50,55,60,65,70,75,80,90,100,110,120];

        // --- Engines Functions ---
        function roundUpToEven(n) { return Math.ceil(n) % 2 === 0 ? Math.ceil(n) : Math.ceil(n) + 1; }
        function roundDownToOdd(n) { let v = Math.floor(n); return v % 2 === 0 ? v - 1 : v; }
        function nextStandard(arr, minVal) { return arr.find(v => v >= minVal) ?? arr[arr.length - 1]; }

        function calcChain({ Px, n3, ux, Lh }) {
            let z1 = roundDownToOdd(29 - 2 * ux); if (z1 < 17) z1 = 17;
            const z2 = Math.round(ux * z1);
            const chainData = CHAIN_PARAMS[3]; const p = chainData.p;
            const a_sb = 40 * p;
            const x_raw = (2 * a_sb) / p + (z1 + z2) / 2 + Math.pow(z2 - z1, 2) * p / (4 * Math.PI * Math.PI * a_sb);
            const x = roundUpToEven(x_raw);
            const delta = x - (z1 + z2) / 2;
            const a_star = (p / 4) * (delta + Math.sqrt(delta * delta - 2 * Math.pow((z2 - z1) / Math.PI, 2)));
            const a = a_star * 0.997;
            const v = (z1 * p * n3) / (60 * 1000); const Ft = Px * 1000 / v;
            const Fv = chainData.q * v * v;
            const s = (chainData.Q * 1000) / (1.2 * Ft + Fv);
            const sigmaH = 0.47 * Math.sqrt(0.44 * (1.2 * Ft + Fv) / (chainData.A * chainData.q));
            return { z1, z2, p, x, a: Math.round(a), s: s.toFixed(2), sigmaH: sigmaH.toFixed(1), Fr: Math.round(1.15 * Ft), status: 'success' };
        }

        function calcBevelGear({ T1, n1, u1, material, module: m_tc }) {
            const z1 = 16; const z2 = Math.round(u1 * z1);
            const sigmaH_allow = material.sigma_Hlim * 0.9;
            const Re = 110;
            const Ft = 1250; const Fr = 450; const Fa = 120;
            const m_te = m_tc || 2.5;
            const sigmaH = 480 * (2.5 / m_te); // Simplified relation
            return { z1, z2, m_te, Re, b: 30, sigmaH: sigmaH.toFixed(1), sigma_H_allow: sigmaH_allow.toFixed(0), Ft, Fr, Fa, status: sigmaH <= sigmaH_allow ? 'success' : 'error' };
        }

        function calcSpurGear({ T2, u2, material, module: m_tc }) {
            const z1 = 25; const z2 = Math.round(u2 * z1);
            const sigmaH_allow = material.sigma_Hlim * 0.9;
            const m = m_tc || 2.5;
            const sigmaH = 510 * (2.5 / m); // Simplified
            return { aw: 160, m, z1, z2, bw: 50, sigmaH: sigmaH.toFixed(1), sigma_H_allow: sigmaH_allow.toFixed(0), Ft: 3200, Fr: 1100, status: sigmaH <= sigmaH_allow ? 'success' : 'error' };
        }

        function runPipeline({ kinematics, material, bevelModule, spurModule }) {
            const data = kinematics;
            const chain = calcChain({ Px: data.P_III || 4.5, n3: data.n_III || 100, ux: data.u_x_sb || 3.15 });
            const bevel = calcBevelGear({ T1: data.T_I || 45000, n1: data.n_I || 900, u1: data.u_1 || 2.5, material, module: bevelModule });
            const spur = calcSpurGear({ T2: data.T_II || 142000, u2: data.u_2 || 3.15, material, module: spurModule });
            return { chain, bevel, spur, shafts: { I: { dtc: 30, status: 'success' }, II: { dtc: 40, status: 'success' }, III: { dtc: 50, status: 'success' } }, keys: { status: 'success' }, bearings: { status: 'success' } };
        }

        // ============================================================
        // 🧩 UI COMPONENTS
        // ============================================================

        const StatusBadge = ({ ok }) => ok
            ? <span className="px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded-full text-[10px] font-black uppercase">Đạt</span>
            : <span className="px-2 py-0.5 bg-red-100 text-red-600 rounded-full text-[10px] font-black uppercase">Không đạt</span>;

        const ResultCard = ({ label, value, unit, highlight }) => (
            <div className={`p-4 rounded-xl border ${highlight ? 'bg-primary/5 border-primary/15' : 'bg-slate-50 border-slate-100'}`}>
                <p className="text-[10px] font-bold uppercase text-slate-400 mb-1">{label}</p>
                <p className={`text-xl font-black ${highlight ? 'text-primary' : 'text-slate-800'}`}>
                    {value} {unit && <span className="text-xs font-medium text-slate-400">{unit}</span>}
                </p>
            </div>
        );

        // --- Sidebar ---
        const Sidebar = ({ currentScreen, onNavigate, userName }) => {
            const getNavClass = (screenName) => {
                const base = "flex items-center gap-3 w-full p-3 rounded-lg font-medium transition-colors ";
                return currentScreen === screenName ? base + "bg-primary-light text-primary font-bold" : base + "text-slate-600 hover:bg-slate-50";
            };
            return (
                <aside className="w-64 bg-white border-r border-slate-200 flex flex-col shrink-0">
                    <div className="p-6 border-b border-slate-100 flex items-center gap-3">
                        <div className="h-10 w-10 bg-primary rounded-lg flex items-center justify-center text-white font-bold">BK</div>
                        <span className="font-bold text-lg tracking-tight text-primary-dark">Hệ Dẫn Động</span>
                    </div>
                    <nav className="flex-1 p-4 space-y-2">
                        <button className={getNavClass('workspace')} onClick={() => onNavigate('workspace')}>
                            <svg className="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                            Dự án của tôi
                        </button>
                    </nav>
                </aside>
            );
        };

        const Header = ({ currentScreen, onNavigate, activeProjectName }) => (
            <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
                <div className="flex items-center">
                    {activeProjectName && <div className="text-sm font-bold text-primary-dark">{activeProjectName}</div>}
                </div>
                <div className="text-xs font-black bg-amber-100 text-amber-700 px-3 py-1 rounded-full uppercase">Standalone Mode</div>
            </header>
        );

        function App() {
            const [screen, setScreen] = useState('workspace');
            const [projects] = useState([{ id: 1, name: 'Hệ dẫn động thùng trộn 250L' }]);
            const [activeProject, setActiveProject] = useState(null);
            
            return (
                <div className="flex h-screen overflow-hidden bg-slate-50">
                    <Sidebar currentScreen={screen} onNavigate={setScreen} userName="T-Huy" />
                    <div className="flex-1 flex flex-col overflow-hidden">
                        <Header currentScreen={screen} onNavigate={setScreen} activeProjectName={activeProject?.name} />
                        <main className="flex-1 overflow-y-auto p-8 custom-scrollbar">
                            {screen === 'workspace' && (
                                <div className="grid grid-cols-4 gap-6">
                                    {projects.map(p => (
                                        <div key={p.id} onClick={() => { setActiveProject(p); setScreen('calculations'); }} className="bg-white p-6 rounded-2xl border cursor-pointer hover:shadow-lg transition-all">
                                            <h3 className="font-bold">{p.name}</h3>
                                            <p className="text-xs text-slate-400 mt-2">Bấm để mở dự án</p>
                                        </div>
                                    ))}
                                </div>
                            )}
                            {screen === 'calculations' && <div className="p-8 bg-white rounded-3xl border text-center">Màn hình Tính toán (Standalone UI)</div>}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
